<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blog Out</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="bg-bg">
    <div class="container">
        <div class="flex items-center justify-center" style="min-height: 100vh;">
            <div class="card" style="width: 100%; max-width: 400px;">
                <div class="card-header text-center">
                    <a href="/" class="logo">
                        <span class="logo-text">Blog Out</span>
                    </a>
                    <h1 class="text-2xl font-bold text-dart mt-4">Iniciar Sesión</h1>
                </div>
                
                <div class="card-body">
                    <form id="loginForm" class="fade-in">
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-input" id="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-input" id="password" required>
                        </div>
                        
                        <div class="alert alert-danger hidden" id="loginError"></div>
                        
                        <button type="submit" class="btn btn-primary btn-full">
                            Iniciar Sesión
                        </button>
                    </form>
                </div>
                
                <div class="card-footer text-center">
                    <p class="text-forest">
                        ¿No tienes cuenta? 
                        <a href="/register" class="font-semibold">Regístrate</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="../../src/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                await Auth.login(email, password);
                // La redirección la maneja el método login
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
